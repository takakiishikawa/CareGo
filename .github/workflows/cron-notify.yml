name: Cron — Notify

# 夜のチェックインを促すPush通知。 GH Actions cron が本番URLの /api/cron/notify を叩く。
# 旧: vercel.json の crons (Hobby plan の Vercel Cron 制限を避けるため GH Actions に移行)
#
# 必要な GitHub Secrets:
#   CRON_SECRET route.ts で検証する Bearer トークン (Vercel 側で未設定なら省略可)
# 本番 URL は公開情報なので直書き。

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'  # JST 10:00 daily

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger notify endpoint
        run: |
          curl --fail-with-body -sS \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://care-go-mu.vercel.app/api/cron/notify"
